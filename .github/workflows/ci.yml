name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Create resources directory
        run: cmake -E make_directory resources

      - name: Configure
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Create resources directory
        run: cmake -E make_directory resources

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build --preset windows-release

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf ninja

      - name: Create resources directory
        run: cmake -E make_directory resources

      - name: Configure
        run: cmake --preset macos-release

      - name: Build
        run: cmake --build --preset macos-release
